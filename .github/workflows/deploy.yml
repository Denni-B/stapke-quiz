name: Deploy Stapke

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_BASE_PATH: "/stapke"
      NEXT_PUBLIC_API_ORIGIN: "https://stapke.onrender.com"
      NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
      NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_PROJECT_ID }}
      NEXT_PUBLIC_APPWRITE_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_DATABASE_ID }}
      NEXT_PUBLIC_APPWRITE_QUIZZES_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_QUIZZES_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_QUESTIONS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_QUESTIONS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_CHAPTERS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_CHAPTERS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_PARTICIPANTS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_PARTICIPANTS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_ANSWERS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_ANSWERS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_GROUPS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_GROUPS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_BUZZES_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_BUZZES_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_BLACKJACK_SESSIONS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_BLACKJACK_SESSIONS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_BLACKJACK_SEATS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_BLACKJACK_SEATS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_BLACKJACK_HANDS_TABLE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_BLACKJACK_HANDS_TABLE_ID }}
      NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
